# =============================================================================
# Pipeline CI — Tests automatisés
# =============================================================================
#
# Ce workflow s'exécute automatiquement à chaque push sur le repository.
# Il installe les dépendances et lance les tests pytest.
#
# Documentation : https://docs.github.com/en/actions
# =============================================================================

name: CI

# Déclencheurs : à chaque push ou pull request
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    # Machine virtuelle Ubuntu
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le code
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      
      # 2. Installer Python
      - name: 🐍 Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. Installer les dépendances
      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. Lancer les tests
      - name: 🧪 Exécution des tests
        run: |
          pytest tests/ -v --tb=short